/* ── HELPERS ──────────────────────────────────────────── */

function parseSegments(line) {
  const parts = String(line).split('**');
  return parts.map((text, i) => ({ text, bold: i % 2 === 1 }));
}

function pad2(n) { return String(n).padStart(2, '0'); }

function formatCountdown(ms) {
  const tot = Math.max(0, Math.floor(ms / 1000));
  return `${pad2(Math.floor(tot / 86400))}d ${pad2(Math.floor((tot % 86400) / 3600))}h ${pad2(Math.floor((tot % 3600) / 60))}m ${pad2(tot % 60)}s`;
}

/* ── DETAIL PANEL ─────────────────────────────────────── */
function Detail({ section, onClose }) {

/* ── MAIN APP ─────────────────────────────────────────── */
function App() {
  const [active,     setActive]     = useState(null);   // section id or null
  const [media,      setMedia]      = useState(null);   // 'trailer' | 'stills' | null
  const [stillIdx,   setStillIdx]   = useState(0);
  const [narrow,     setNarrow]     = useState(() => window.innerWidth < 820);
  const [tick,       setTick]       = useState(0);
  const lastSection = useRef(null);
  const REVEAL = new Date('2026-07-02T11:00:00-07:00').getTime();

  useEffect(() => {
    const onResize = () => setNarrow(window.innerWidth < 820);
    window.addEventListener('resize', onResize);
    const timer = setInterval(() => setTick(t => t + 1), 1000);
    return () => { window.removeEventListener('resize', onResize); clearInterval(timer); };
  }, []);

  const now   = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  const cdDiff = REVEAL - Date.now();
  const countdownOn = cdDiff > 0;
  const countdown = formatCountdown(cdDiff);

  if (active) lastSection.current = SECTIONS[active];
  const section = active ? SECTIONS[active] : lastSection.current;
  const open = !!active;

  const openSection = (id) => {
    setActive(p => p === id ? null : id);
    if (!lastSection.current || lastSection.current.id !== id) lastSection.current = SECTIONS[id];
  };
  const closeSection = () => setActive(null);

  const openTrailer = () => {
    if (active) { setActive(null); setTimeout(() => setMedia('trailer'), 520); }
    else setMedia('trailer');
  };
  const openStills = () => {
    if (active) { setActive(null); setTimeout(() => { setMedia('stills'); setStillIdx(0); }, 520); }
    else { setMedia('stills'); setStillIdx(0); }
  };
  const closeMedia = () => setMedia(null);
  const nextStill = () => setStillIdx(i => (i + 1) % STILLS.length);
  const prevStill = () => setStillIdx(i => (i - 1 + STILLS.length) % STILLS.length);

  /* layout geometry */
  const ease = 'cubic-bezier(0.22,0.61,0.36,1)';
  const trans = `left 0.6s ${ease}, transform 0.6s ${ease}`;
  let stageStyle, phoneWrapStyle, panelStyle;
  if (narrow) {
    stageStyle    = { position: 'relative', width: '100%', maxWidth: open ? '460px' : '360px', margin: '0 auto', height: open ? 'min(82vh, 760px)' : '648px', minHeight: open ? '520px' : '0', transition: `height 0.5s ${ease}` };
    phoneWrapStyle= { position: 'absolute', top: 0, left: '50%', transformOrigin: 'top center', transition: `${trans}, opacity 0.4s ${ease}`, transform: open ? 'translateX(-50%) scale(0.82)' : 'translateX(-50%) scale(1)', opacity: open ? 0 : 1, pointerEvents: open ? 'none' : 'auto' };
    panelStyle    = { position: 'absolute', inset: 0, transition: `opacity 0.5s ${ease}, transform 0.5s ${ease}`, opacity: open ? 1 : 0, transform: open ? 'translateY(0)' : 'translateY(24px)', pointerEvents: open ? 'auto' : 'none' };
  } else {
    stageStyle    = { position: 'relative', width: '100%', maxWidth: '1060px', margin: '0 auto', height: '648px' };
    phoneWrapStyle= { position: 'absolute', top: 0, transformOrigin: 'top left', transition: trans, left: open ? '8px' : '50%', transform: open ? 'translateX(0) scale(0.78)' : 'translateX(-50%) scale(1)' };
    panelStyle    = { position: 'absolute', top: 0, left: '296px', right: 0, height: '648px', transition: `opacity 0.55s ${ease}, transform 0.55s ${ease}`, opacity: open ? 1 : 0, transform: open ? 'translateX(0)' : 'translateX(30px)', pointerEvents: open ? 'auto' : 'none' };
  }

  const mediaOnPhone = !!media && !narrow;
  const mediaOnFull  = !!media && narrow;

  return (
    <div style={{ minHeight: '100vh', background: '#000', color: '#cfe2ea', fontFamily: "'Montserrat',sans-serif", display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '42px 20px 48px', position: 'relative', overflowX: 'hidden' }}>

      {/* cast */}
      <div style={{ display: 'flex', gap: 'clamp(28px,6vw,72px)', fontWeight: 400, fontSize: 'clamp(10px,1.4vw,13px)', letterSpacing: '.3em', textTransform: 'uppercase', color: 'rgba(212,234,242,.8)', marginBottom: 'clamp(18px,3vh,28px)' }}>
        <span>Efren Ramirez</span><span>Richard Kind</span>
      </div>

      {/* title */}
      <div style={{ fontWeight: 600, fontSize: 'clamp(26px,4.6vw,46px)', letterSpacing: '.14em', lineHeight: 1.05, textTransform: 'uppercase', color: '#d8eff5', textShadow: '0 0 18px rgba(120,205,230,.55),0 0 48px rgba(90,180,215,.32),0 0 92px rgba(70,160,200,.18)', textAlign: 'center' }}>The End Is At</div>
      <div style={{ fontWeight: 600, fontSize: 'clamp(58px,12vw,128px)', letterSpacing: '.1em', lineHeight: 0.92, textTransform: 'uppercase', color: '#dcf1f7', textShadow: '0 0 22px rgba(120,205,230,.6),0 0 58px rgba(90,180,215,.34),0 0 110px rgba(70,160,200,.2)', textAlign: 'center', marginTop: '4px', marginBottom: 'clamp(30px,5vh,48px)' }}>Hand</div>

      {/* stage */}
      <div style={stageStyle}>

        {/* phone wrapper */}
        <div style={phoneWrapStyle}>
          {/* halo */}
          <div style={{ position: 'absolute', left: '50%', top: '46%', transform: 'translate(-50%,-50%)', width: '420px', height: '560px', background: 'radial-gradient(50% 50% at 50% 50%,rgba(80,175,205,.22),transparent 70%)', filter: 'blur(8px)', animation: 'teiahHalo 6s ease-in-out infinite', pointerEvents: 'none' }} />

          {/* phone body */}
          <div style={{ position: 'relative', width: '308px', height: '638px', borderRadius: '48px', background: '#050709', border: '1px solid rgba(140,205,218,.22)', boxShadow: '0 0 0 1px rgba(0,0,0,.7),0 30px 80px rgba(0,0,0,.8),0 0 70px 4px rgba(80,170,200,.16),inset 0 1.5px 0 rgba(155,218,232,.3),inset 0 0 0 1px rgba(120,195,210,.05)', overflow: 'hidden', transition: 'transform 0.6s cubic-bezier(0.7,0,0.3,1)', transform: mediaOnPhone ? 'rotate(90deg)' : 'none' }}>

            {/* screen inset */}

              {/* media overlay (desktop only — phone rotates to landscape) */}
              {mediaOnPhone && (
                <div style={{ position: 'absolute', inset: 0, background: '#000', zIndex: 20, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <div style={{ transform: 'rotate(-90deg)', width: '624px', height: '294px', position: 'relative', background: '#000', flexShrink: 0 }}>
                    {media === 'trailer' && (
                      <iframe
                        src="https://player.vimeo.com/video/1099239237?badge=0&autopause=0&autoplay=1&player_id=0&app_id=58479"
                        allow="autoplay; fullscreen; picture-in-picture"
                        style={{ width: '100%', height: '100%', border: 0, display: 'block' }}
                        title="THE END IS AT HAND | Teaser Trailer"
                      />
                    )}
                    {media === 'stills' && (
                      <>
                        <div style={{ width: '100%', height: '100%', backgroundImage: `url("${STILLS[stillIdx]}")`, backgroundSize: 'cover', backgroundPosition: 'center' }} />
                        <div onClick={nextStill} style={{ position: 'absolute', inset: 0, cursor: 'pointer', zIndex: 1 }} />
                        <div onClick={prevStill} style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: '32%', cursor: 'pointer', zIndex: 2 }} />
                        <div style={{ position: 'absolute', left: 0, right: 0, bottom: '12px', display: 'flex', justifyContent: 'center', gap: '7px', zIndex: 4, pointerEvents: 'none' }}>
                          {STILLS.map((_, i) => <span key={i} style={{ width: '6px', height: '6px', borderRadius: '50%', background: i === stillIdx ? '#7cc6df' : 'rgba(200,222,230,.35)', display: 'inline-block' }} />)}
                        </div>
                      </>
                    )}
                    <button onClick={closeMedia} style={{ position: 'absolute', top: '8px', right: '10px', width: '26px', height: '26px', borderRadius: '50%', background: 'rgba(0,0,0,.55)', border: '1px solid rgba(200,222,230,.3)', color: '#cfe2ea', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '13px', cursor: 'pointer', zIndex: 5, padding: 0 }}>✕</button>
                  </div>
                </div>
              )}

              <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to bottom,rgba(0,2,4,.55) 0%,rgba(0,2,4,.35) 30%,rgba(0,2,4,.78) 100%)' }} />

              {/* camera dot */}
              <div style={{ position: 'absolute', top: '15px', left: '50%', transform: 'translateX(-50%)', width: '9px', height: '9px', borderRadius: '50%', background: '#020304', boxShadow: 'inset 0 0 0 1px rgba(120,195,210,.35)', zIndex: 6 }} />

              {/* lock screen UI */}
              <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', padding: '16px 14px 18px', zIndex: 4 }}>
                {/* status bar */}
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: '6px', height: '14px', opacity: .62 }}>
                  <span style={{ fontWeight: 600, fontSize: '8px', letterSpacing: '.12em', color: '#cfe2ea' }}>NO SIGNAL</span>
                </div>

                {/* clock */}
                <div style={{ textAlign: 'center', marginTop: '14px', marginBottom: '26px' }}>
                  <div style={{ fontWeight: 300, fontSize: '46px', letterSpacing: '.02em', color: '#eaf7fb', lineHeight: 1, textShadow: '0 0 30px rgba(120,205,230,.4)' }}>{now}</div>
                  <div style={{ fontWeight: 400, fontSize: '10px', letterSpacing: '.18em', textTransform: 'uppercase', color: 'rgba(200,222,230,.55)', marginTop: '8px' }}>{today}</div>
                </div>

                {/* notifications */}
                <div style={{ display: 'flex', flexDirection: 'column', gap: '9px' }}>
                  {NAV.map(item => {
                    const on = active === item.id;
                    return (
                      <button key={item.id} onClick={() => openSection(item.id)} style={{ display: 'flex', alignItems: 'center', gap: '11px', borderRadius: '16px', cursor: 'pointer', padding: '11px 12px', textAlign: 'left', backdropFilter: 'blur(8px)', WebkitBackdropFilter: 'blur(8px)', transition: 'border-color .3s,background .3s', background: on ? 'rgba(108,184,212,.13)' : 'rgba(10,16,20,.62)', border: on ? '1px solid rgba(124,198,223,.42)' : '1px solid rgba(140,190,210,.16)', boxShadow: 'none', opacity: on ? .92 : 1 }}>
                        <span style={{ width: '34px', height: '34px', flexShrink: 0, borderRadius: '9px', background: 'rgba(108,184,212,.12)', border: '1px solid rgba(108,184,212,.32)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '13px', color: '#7cc6df' }}>
                          {item.isEye && <EyeIcon />}
                          {item.isTeam && <TeamIcon />}
                          {item.isArrow && <span style={{ fontSize: '21px', lineHeight: 1, color: '#7cc6df' }}>↗</span>}
                          {item.isGlyph && item.glyph}
                        </span>
                        <span style={{ flex: 1, minWidth: 0 }}>
                          <span style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                            <span style={{ fontWeight: 600, fontSize: '9px', letterSpacing: '.16em', textTransform: 'uppercase', color: '#cfe2ea' }}>{item.label}</span>
                            <span style={{ fontWeight: 400, fontSize: '8px', letterSpacing: '.08em', textTransform: 'uppercase', color: 'rgba(200,222,230,.4)' }}>now</span>
                          </span>
                        </span>
                      </button>
                    );
                  })}
                </div>

                {/* hint */}
                <div style={{ marginTop: 'auto', textAlign: 'center', fontWeight: 400, fontSize: '9px', letterSpacing: '.16em', textTransform: 'uppercase', color: 'rgba(200,222,230,.32)' }}>
                  {open ? 'tap to switch · back to close' : 'tap a notification to open'}
                </div>
              </div>

              {/* trailer button */}
              <div onClick={openTrailer} style={{ position: 'absolute', left: '30px', bottom: '74px', zIndex: 5, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '6px', cursor: 'pointer' }}>
                <div style={{ width: '46px', height: '46px', borderRadius: '50%', background: 'rgba(108,184,212,.12)', border: '1px solid rgba(108,184,212,.32)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5 L19 12 L8 19 Z" fill="#7cc6df"/></svg>
                </div>
                <span style={{ fontWeight: 600, fontSize: '8px', letterSpacing: '.16em', textTransform: 'uppercase', color: 'rgba(200,222,230,.6)' }}>Trailer</span>
              </div>

              {/* stills button */}
              <div style={{ position: 'absolute', right: '30px', bottom: '74px', zIndex: 5, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '6px' }}>
                <div onClick={openStills} style={{ width: '46px', height: '46px', borderRadius: '50%', background: 'rgba(108,184,212,.12)', border: '1px solid rgba(108,184,212,.32)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
                  <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="2" y="7" width="20" height="13" rx="3" fill="#7cc6df"/>
                    <rect x="8.5" y="4" width="7" height="4" rx="1.5" fill="#7cc6df"/>
                    <circle cx="12" cy="13.5" r="3.5" fill="#0a1014"/>
                    <circle cx="18" cy="10.4" r="1" fill="#0a1014"/>
                  </svg>
                </div>
                <span style={{ fontWeight: 600, fontSize: '8px', letterSpacing: '.16em', textTransform: 'uppercase', color: 'rgba(200,222,230,.6)' }}>Stills</span>
              </div>

            </div>{/* /screen inset */}
          </div>{/* /phone body */}
        </div>{/* /phone wrapper */}

        {/* reading panel */}
        <div style={panelStyle}>
          {lastSection.current && (
            <Detail section={section} onClose={closeSection} />
          )}
        </div>

      </div>{/* /stage */}

      {/* full-screen media overlay (mobile only) */}
      {mediaOnFull && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 90, background: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          {media === 'trailer' && (
            <div style={{ position: 'relative', width: '100%', maxWidth: '760px', aspectRatio: '16/9' }}>
              <iframe
                src="https://player.vimeo.com/video/1099239237?badge=0&autopause=0&autoplay=1&player_id=0&app_id=58479"
                allow="autoplay; fullscreen; picture-in-picture"
                style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', border: 0, display: 'block' }}
                title="THE END IS AT HAND | Teaser Trailer"
              />
            </div>
          )}
          {media === 'stills' && (
            <div style={{ position: 'absolute', inset: 0 }}>
              <div style={{ position: 'absolute', inset: 0, backgroundImage: `url("${STILLS[stillIdx]}")`, backgroundSize: 'contain', backgroundRepeat: 'no-repeat', backgroundPosition: 'center' }} />
              <div onClick={nextStill} style={{ position: 'absolute', inset: 0, cursor: 'pointer', zIndex: 1 }} />
              <div onClick={prevStill} style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: '32%', cursor: 'pointer', zIndex: 2 }} />
              <div style={{ position: 'absolute', left: 0, right: 0, bottom: 'max(20px, env(safe-area-inset-bottom))', display: 'flex', justifyContent: 'center', gap: '8px', zIndex: 4, pointerEvents: 'none' }}>
                {STILLS.map((_, i) => <span key={i} style={{ width: '6px', height: '6px', borderRadius: '50%', background: i === stillIdx ? '#7cc6df' : 'rgba(200,222,230,.35)', display: 'inline-block' }} />)}
              </div>
            </div>
          )}
          <div onClick={closeMedia} style={{ position: 'absolute', top: 'max(16px, env(safe-area-inset-top))', right: '16px', width: '40px', height: '40px', borderRadius: '50%', background: 'rgba(0,0,0,.6)', border: '1px solid rgba(200,222,230,.3)', color: '#cfe2ea', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '17px', cursor: 'pointer', zIndex: 5 }}>✕</div>
        </div>
      )}

      {/* tagline */}
      <div style={{ marginTop: 'clamp(30px,5vh,46px)', fontWeight: 500, fontSize: 'clamp(11px,1.5vw,14px)', letterSpacing: '.18em', textTransform: 'uppercase', color: '#6cb8d4', textAlign: 'center', textShadow: '0 0 18px rgba(108,184,212,.4)' }}>
        <span style={{ whiteSpace: 'nowrap' }}>It&rsquo;s not on your screen.</span>{' '}
        <span style={{ whiteSpace: 'nowrap' }}>It&rsquo;s <span style={{ fontWeight: 700, color: '#9ad4e8' }}>under</span> it.</span>
      </div>

      {/* laurels */}
      <div style={{ marginTop: 'clamp(30px,5vh,44px)', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '16px' }}>
        <div style={{ fontWeight: 600, fontSize: '9px', letterSpacing: '.3em', textTransform: 'uppercase', color: 'rgba(200,222,230,.4)' }}>Official Selection</div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 'clamp(26px,4vw,52px)', flexWrap: 'wrap' }}>
          <img src="project/assets/laurel-shortfest.png" alt="Palm Springs International ShortFest 2026" style={{ height: '84px', width: 'auto', opacity: .9 }} />
          <div style={{ position: 'relative', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', height: '84px' }}>
            <img src="project/assets/laurel-fantasia.png" alt="Fantasia 2026 — Official Selection" style={{ height: '48px', width: 'auto', opacity: .9, display: 'block' }} />
            {countdownOn && (
              <div style={{ position: 'absolute', inset: narrow ? '-2px 0' : '-2px -24px', background: '#f4f1ea', borderRadius: '3px', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '5px', padding: narrow ? '8px 10px' : '8px 16px', boxShadow: '0 3px 16px rgba(0,0,0,.45)' }}>
                <div style={{ fontWeight: 600, fontSize: '7px', letterSpacing: '.2em', textTransform: 'uppercase', color: '#5a6b73', textAlign: 'center', lineHeight: 1.5 }}>Special Announcement<br/>Coming Soon</div>
                <div style={{ fontWeight: 700, fontSize: '13px', letterSpacing: '.05em', color: '#0d141a', fontVariantNumeric: 'tabular-nums' }}>{countdown}</div>
              </div>
            )}
          </div>
          <img src="project/assets/laurel-screamfest.png" alt="Screamfest" style={{ height: '82px', width: 'auto', opacity: .9 }} />
        </div>
      </div>

      {/* billing block */}
      {(() => {
        const cName = { fontWeight: 600, fontSize: narrow ? '11px' : '9px', letterSpacing: '.12em', textTransform: 'uppercase', color: 'rgba(216,233,239,.72)' };
        const cSep  = { fontWeight: 500, fontSize: narrow ? '9px'  : '7.5px', letterSpacing: '.16em', textTransform: 'uppercase', color: 'rgba(190,210,218,.42)' };
        const cVal  = { fontWeight: 600, fontSize: narrow ? '11px' : '9px', letterSpacing: '.12em', textTransform: 'uppercase', color: 'rgba(216,233,239,.66)' };
        return (
          <div style={{ marginTop: 'clamp(34px,6vh,54px)', maxWidth: '880px', width: '100%', display: 'flex', flexDirection: 'column', gap: '7px', alignItems: 'center' }}>
            <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', alignItems: 'baseline', gap: '4px 7px', lineHeight: 1.5 }}>
              <span style={cName}>AFI Conservatory</span>
              <span style={cSep}>presents</span>
              <span style={cName}>&ldquo;The End Is At Hand&rdquo;</span>
              <span style={cSep}>starring</span>
              <span style={cName}>Efren Ramirez &middot; Richard Kind</span>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', alignItems: 'baseline', gap: '4px 7px', lineHeight: 1.5 }}>
              <span style={cSep}>Music by</span>
              <span style={cVal}>Alain Emile</span>
              <span style={cSep}>Edited by</span>
              <span style={cVal}>Junwu Tan</span>
              <span style={cSep}>Production Design by</span>
              <span style={cVal}>Yuheng Kuang</span>
              <span style={cSep}>Cinematography by</span>
              <span style={cVal}>Diana Dahllund</span>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', alignItems: 'baseline', gap: '4px 7px', lineHeight: 1.5 }}>
              <span style={cSep}>Written &amp; Produced by</span>
              <span style={cVal}>Sam Gallen</span>
              <span style={cSep}>Directed by</span>
              <span style={cVal}>Japhet E. Velazquez</span>
            </div>
          </div>
        );
      })()}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
